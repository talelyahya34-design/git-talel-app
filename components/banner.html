<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>Test Banner</title>
    <style>
        /* Stile base del banner (nascosto di default) /
        .banner {
            background-color: #4CAF50; / Colore verde distintivo /
            color: white;
            text-align: center;
            padding: 15px;
            font-family: sans-serif;
            font-weight: bold;
            display: none; / Punto 2.2: nascosto di default /
        }

        / Classe aggiuntiva per renderlo visibile /
        .banner.visibile {
            display: block; / Punto 2.2: visibile solo con questa classe */
        }
    </style>
</head>
<body>

    <div class="banner visibile">
        👋 Ciao! Questo è il nuovo banner di notifica!
    </div>

</body>
</html>
